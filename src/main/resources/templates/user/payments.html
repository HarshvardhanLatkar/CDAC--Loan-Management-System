<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Pay EMI')}"></head>
<body class="bg-slate-900">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/sidebar :: user-sidebar}"></div>
    <main class="flex-1 p-8">
        <div class="max-w-4xl mx-auto">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white">Pay EMI</h1>
                <p class="text-slate-400 mt-1">Make EMI payments for your approved loans via Razorpay</p>
            </div>

            <div th:if="${loans.isEmpty()}" class="card rounded-2xl p-16 text-center">
                <svg class="w-16 h-16 text-slate-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                </svg>
                <p class="text-slate-400 mb-2">No approved loans found</p>
                <p class="text-slate-500 text-sm">Your EMI payment option will appear once a loan is approved</p>
            </div>

            <div th:if="${!loans.isEmpty()}" class="space-y-6">
                <div th:each="loan : ${loans}" class="card rounded-xl p-6">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
                        <div>
                            <h3 class="text-white font-semibold text-lg">Loan #<span th:text="${loan.id}"></span></h3>
                            <p class="text-slate-400 text-sm">
                                ₹<span th:text="${#numbers.formatDecimal(loan.loanAmount, 1, 'COMMA', 2, 'POINT')}"></span>
                                at <span th:text="${loan.interestRate}"></span>% for
                                <span th:text="${loan.tenureMonths}"></span> months
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-slate-400 text-xs mb-1">Monthly EMI</p>
                            <p class="text-2xl font-bold text-indigo-400">
                                ₹<span th:text="${#numbers.formatDecimal(loan.emi, 1, 'COMMA', 2, 'POINT')}"></span>
                            </p>
                        </div>
                    </div>
                    <button th:attr="data-loan-id=${loan.id}, data-emi=${loan.emi}"
                            onclick="payEMI(this.dataset.loanId, this.dataset.emi)"
                            class="btn-primary w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                        </svg>
                        Pay EMI via Razorpay
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="paymentModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="card rounded-2xl p-8 w-full max-w-sm mx-4">
        <div class="text-center">
            <div class="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h3 class="text-white font-bold text-xl mb-2">Payment Successful!</h3>
            <p class="text-slate-400 text-sm mb-6">Your EMI payment has been processed successfully.</p>
            <button onclick="document.getElementById('paymentModal').classList.add('hidden')"
                    class="btn-primary px-6 py-2.5 rounded-xl text-white font-medium">Close</button>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
async function payEMI(loanId, emiAmount) {
    try {
        const res = await fetch('/api/payments/create-order/' + loanId, { method: 'POST' });
        const data = await res.json();
        if (data.error) { alert('Error: ' + data.error); return; }

        const options = {
            key: data.razorpayKeyId,
            amount: data.amount * 100,
            currency: 'INR',
            name: 'Loan Management System',
            description: 'EMI Payment for Loan #' + loanId,
            order_id: data.orderId,
            handler: async function(response) {
                const verifyRes = await fetch('/api/payments/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_signature: response.razorpay_signature
                    })
                });
                const verifyData = await verifyRes.json();
                if (verifyData.status === 'SUCCESS') {
                    document.getElementById('paymentModal').classList.remove('hidden');
                } else {
                    alert('Payment verification failed. Please contact support.');
                }
            },
            theme: { color: '#6366f1' }
        };
        new Razorpay(options).open();
    } catch (err) {
        alert('Payment initiation failed: ' + err.message);
    }
}
</script>
</body>
</html>
