<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('My Loans')}"></head>
<body class="bg-slate-900">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/sidebar :: user-sidebar}"></div>
    <main class="flex-1 p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-white">My Loans</h1>
                    <p class="text-slate-400 mt-1">All your loan applications</p>
                </div>
                <a href="/user/apply-loan" class="btn-primary px-5 py-2.5 rounded-xl text-white font-medium text-sm">+ New Loan</a>
            </div>

            <div th:if="${success}" class="mb-6 p-4 bg-green-500/10 border border-green-500/30 rounded-xl text-green-400" th:text="${success}"></div>
            <div th:if="${error}" class="mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400" th:text="${error}"></div>

            <div th:if="${loans.isEmpty()}" class="card rounded-2xl p-16 text-center">
                <svg class="w-16 h-16 text-slate-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p class="text-slate-400 mb-4">No loan applications yet</p>
                <a href="/user/apply-loan" class="btn-primary px-6 py-2.5 rounded-xl text-white font-medium">Apply for Your First Loan</a>
            </div>

            <div th:if="${!loans.isEmpty()}" class="space-y-4">
                <div th:each="loan : ${loans}" class="card rounded-xl p-6">
                    <div class="flex flex-wrap items-start justify-between gap-4">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="text-white font-semibold">Loan #<span th:text="${loan.id}"></span></h3>
                                <span th:class="'px-2.5 py-0.5 rounded-full text-xs font-medium ' + (${loan.status.name() == 'APPROVED'} ? 'badge-approved' : (${loan.status.name() == 'REJECTED'} ? 'badge-rejected' : 'badge-pending'))"
                                      th:text="${loan.status}"></span>
                            </div>
                            <p class="text-slate-400 text-sm" th:text="${#temporals.format(loan.createdAt, 'dd MMM yyyy, hh:mm a')}"></p>
                        </div>
                        <div class="flex gap-6 text-right">
                            <div>
                                <p class="text-slate-400 text-xs">Amount</p>
                                <p class="text-white font-semibold" th:text="'₹' + ${#numbers.formatDecimal(loan.loanAmount, 1, 'COMMA', 2, 'POINT')}"></p>
                            </div>
                            <div>
                                <p class="text-slate-400 text-xs">EMI/Month</p>
                                <p class="text-indigo-400 font-semibold" th:text="'₹' + ${#numbers.formatDecimal(loan.emi, 1, 'COMMA', 2, 'POINT')}"></p>
                            </div>
                            <div>
                                <p class="text-slate-400 text-xs">Tenure</p>
                                <p class="text-white font-semibold" th:text="${loan.tenureMonths} + ' mo'"></p>
                            </div>
                            <div>
                                <p class="text-slate-400 text-xs">Rate</p>
                                <p class="text-white font-semibold" th:text="${loan.interestRate} + '% p.a.'"></p>
                            </div>
                        </div>
                    </div>

                    <div th:if="${loan.status.name() == 'REJECTED' && loan.rejectionReason != null}"
                         class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg">
                        <p class="text-red-400 text-sm"><span class="font-medium">Rejection reason:</span>
                            <span th:text="${loan.rejectionReason}"></span></p>
                    </div>

                    <div class="mt-4 pt-4 border-t border-slate-700 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-slate-500 text-xs">Documents:</span>
                            <span th:text="${loan.documents != null ? loan.documents.size() : 0}"
                                  class="text-slate-300 text-xs font-medium"></span>
                            <span class="text-slate-500 text-xs">/ 3 uploaded</span>
                        </div>
                        <div class="flex gap-3">
                            <a href="/user/upload-docs" class="text-indigo-400 hover:text-indigo-300 text-sm">Upload Docs</a>
                            <span th:if="${loan.status.name() == 'APPROVED'}">
                                <a href="/user/payments" class="text-emerald-400 hover:text-emerald-300 text-sm">Pay EMI →</a>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
