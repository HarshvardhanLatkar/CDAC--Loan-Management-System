<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Admin Dashboard')}"></head>
<body class="bg-slate-900">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>
    <main class="flex-1 p-8">
        <div class="max-w-7xl mx-auto">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white">Admin Dashboard</h1>
                <p class="text-slate-400 mt-1">Overview of all loan activity</p>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                <div class="card rounded-xl p-5 col-span-1">
                    <p class="text-slate-400 text-xs mb-1">Total Loans</p>
                    <p class="text-2xl font-bold text-white" th:text="${totalLoans}">0</p>
                </div>
                <div class="card rounded-xl p-5 col-span-1">
                    <p class="text-slate-400 text-xs mb-1">Pending</p>
                    <p class="text-2xl font-bold text-yellow-400" th:text="${pendingCount}">0</p>
                </div>
                <div class="card rounded-xl p-5 col-span-1">
                    <p class="text-slate-400 text-xs mb-1">Approved</p>
                    <p class="text-2xl font-bold text-emerald-400" th:text="${approvedCount}">0</p>
                </div>
                <div class="card rounded-xl p-5 col-span-1">
                    <p class="text-slate-400 text-xs mb-1">Rejected</p>
                    <p class="text-2xl font-bold text-red-400" th:text="${rejectedCount}">0</p>
                </div>
                <div class="card rounded-xl p-5 col-span-1">
                    <p class="text-slate-400 text-xs mb-1">Disbursed</p>
                    <p class="text-lg font-bold text-indigo-400">₹<span th:text="${#numbers.formatDecimal(totalDisbursed, 1, 'COMMA', 0, 'POINT')}">0</span></p>
                </div>
                <div class="card rounded-xl p-5 col-span-1">
                    <p class="text-slate-400 text-xs mb-1">Collected</p>
                    <p class="text-lg font-bold text-purple-400">₹<span th:text="${#numbers.formatDecimal(totalCollected, 1, 'COMMA', 0, 'POINT')}">0</span></p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Users -->
                <div class="card rounded-xl p-6">
                    <h2 class="text-lg font-semibold text-white mb-4">Registered Users</h2>
                    <div th:if="${users.isEmpty()}" class="text-slate-500 text-sm">No users yet.</div>
                    <ul th:if="${!users.isEmpty()}" class="space-y-3">
                        <li th:each="u : ${users}" class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full btn-primary flex items-center justify-center text-white text-xs font-bold"
                                     th:text="${#strings.substring(u.name, 0, 1).toUpperCase()}">U</div>
                                <div>
                                    <p class="text-white text-sm font-medium" th:text="${u.name}"></p>
                                    <p class="text-slate-400 text-xs" th:text="${u.email}"></p>
                                </div>
                            </div>
                            <span th:class="'px-2 py-0.5 rounded-full text-xs ' + (${u.role.name() == 'ADMIN'} ? 'badge-approved' : 'badge-pending')"
                                  th:text="${u.role}"></span>
                        </li>
                    </ul>
                </div>

                <!-- Recent Payments -->
                <div class="card rounded-xl p-6">
                    <h2 class="text-lg font-semibold text-white mb-4">Recent Payments</h2>
                    <div th:if="${recentPayments.isEmpty()}" class="text-slate-500 text-sm">No payments yet.</div>
                    <ul th:if="${!recentPayments.isEmpty()}" class="space-y-3">
                        <li th:each="p : ${recentPayments}" th:if="${p.status == 'SUCCESS'}"
                            class="flex items-center justify-between border-b border-slate-700 pb-3">
                            <div>
                                <p class="text-white text-sm">Loan #<span th:text="${p.loan.id}"></span></p>
                                <p class="text-slate-400 text-xs" th:text="${#temporals.format(p.paymentDate, 'dd MMM yyyy')}"></p>
                            </div>
                            <span class="text-emerald-400 font-semibold text-sm">+₹<span th:text="${#numbers.formatDecimal(p.amount, 1, 'COMMA', 2, 'POINT')}"></span></span>
                        </li>
                    </ul>
                    <a href="/admin/payments" class="text-indigo-400 hover:text-indigo-300 text-sm mt-4 block">View all payments →</a>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
