<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | Loan Management System'">Loan Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155', 600: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .btn-primary:hover { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .input-field { background-color: #334155; border: 1px solid #475569; color: #e2e8f0; }
        .input-field:focus { border-color: #6366f1; outline: none; }
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background-color: #334155; }
        .badge-pending { background-color: #f59e0b22; color: #f59e0b; }
        .badge-approved { background-color: #10b98122; color: #10b981; }
        .badge-rejected { background-color: #ef444422; color: #ef4444; }
    </style>
</head>
</html>
