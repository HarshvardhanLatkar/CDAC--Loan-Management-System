<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Login')}"></head>
<body class="min-h-screen flex items-center justify-center bg-slate-900">
<div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl btn-primary mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-white">Loan Management</h1>
        <p class="text-slate-400 mt-1">Sign in to your account</p>
    </div>

    <div class="card rounded-2xl p-8 shadow-2xl">
        <div th:if="${error}" class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm" th:text="${error}"></div>
        <div th:if="${message}" class="mb-4 p-3 bg-green-500/10 border border-green-500/30 rounded-lg text-green-400 text-sm" th:text="${message}"></div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Email Address</label>
                <input type="email" name="username" placeholder="you@example.com" required
                       class="input-field w-full px-4 py-3 rounded-xl focus:ring-2 focus:ring-indigo-500"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                <input type="password" name="password" placeholder="••••••••" required
                       class="input-field w-full px-4 py-3 rounded-xl focus:ring-2 focus:ring-indigo-500"/>
            </div>
            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold transition-all hover:shadow-lg hover:shadow-indigo-500/25">
                Sign In
            </button>
        </form>

        <p class="text-center text-slate-400 text-sm mt-6">
            Don't have an account?
            <a href="/register" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1">Register here</a>
        </p>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
        Demo: admin@loan.com / admin123
    </p>
</div>
</body>
</html>
