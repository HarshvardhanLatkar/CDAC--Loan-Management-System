server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/loan_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=sql123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/docs

app.loan.interest-rate=10.5
app.loan.currency=INR
app.loan.min-amount=10000
app.loan.max-amount=5000000
app.loan.min-tenure=3
app.loan.max-tenure=360

razorpay.key.id=rzp_test_XXXXXXXXXXXXX
razorpay.key.secret=YOUR_RAZORPAY_SECRET

logging.level.com.loanmanagement=DEBUG
logging.level.org.springframework.security=INFO
